<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Projet Photoshop</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(135deg,#fdf2f8 0%, #f3e8ff 100%);

min-height:100vh;

overflow-x:hidden;
}

/* HEADER */

.header{

text-align: center;
 padding: 0px 26px 7px;
}

.header-icon{

width:110px;
height:110px;

margin:auto;

border-radius:35px;

background:
linear-gradient(135deg,#ec4899,#a855f7);

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 15px 35px rgba(168,85,247,.20);
}

.header-icon i{

color:white;

font-size:50px;
}

.header h1{

font-size:70px;

font-weight:800;

color:#312e81;

margin-top:30px;
}

.header p{

margin-top:18px;

color:#6b21a8;

font-size:20px;

line-height:1.8;
}

/* SHOWCASE */

.project-showcase{

width:90%;

margin:auto;

margin-top:40px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(450px,1fr));

gap:35px;
}

/* CARD */

.showcase-card{

background:white;

border-radius:40px;

padding:25px;

border:
1px solid #f5d0fe;

box-shadow:
0 15px 35px rgba(236,72,153,.10);

transition:.4s;
}

.showcase-card:hover{

transform:
translateY(-8px);

box-shadow:
0 20px 40px rgba(168,85,247,.18);
}

/* IMAGE */

.showcase-card img{
    height: 590px;
    width: 575px;
    border-radius: 25px;
    display: block;}

    /* video */
    .showcase-card video{
  height: 463px;
    width: 575px;
    border-radius: 25px;
    display: block;
    }
/* BOUTON */

.btn-container{

text-align:center;

margin-top:50px;

margin-bottom:70px;
}

.project-btn{
    margin-top: 42px;
    margin-left: 79px;

display:inline-block;

padding:18px 38px;

border-radius:50px;

text-decoration:none;

background:
linear-gradient(135deg,#ec4899,#a855f7);

color:white;

font-size:17px;

font-weight:600;

transition:.3s;
}

.project-btn:hover{

transform:
translateY(-4px);

box-shadow:
0 15px 30px rgba(168,85,247,.25);
}

/* RESPONSIVE */

@media(max-width:900px){

.project-showcase{

grid-template-columns:1fr;
}

}

@media(max-width:768px){

.header h1{

font-size:45px;
}

.header p{

font-size:16px;
}

.showcase-card{

padding:18px;
}

.project-showcase{

width:95%;

grid-template-columns:
minmax(0,1fr);
}

}
image{
    width: 20px;
}
video{
    width: 20px;
}

</style>

</head>

<body>
 <a href="index.html" class="project-btn" target="_blank">
                        retour au portfolio
                    </a>
<!-- HEADER -->

<div class="header">



<h1>Projet Photoshop</h1>

<p>

Création graphique réalisée avec Adobe Photoshop :
logo, flyer publicitaire et posts Instagram.

</p>

</div>

<!-- PREMIÈRE LIGNE -->

<section class="project-showcase">

<!-- IMAGE -->

<div class="showcase-card">

<img src="image logo.png"
alt="Logo Mirage">

</div>

<!-- VIDEO -->

<div class="showcase-card">

<video controls autoplay muted loop>

<source src="Video Project 2.mp4"
type="video/mp4">

</video>

</div>

</section>

<!-- DEUXIÈME LIGNE -->

<section class="project-showcase">

<!-- IMAGE -->

<div class="showcase-card">

<img src="image flayer.png"
alt="Flyer">

</div>

<!-- VIDEO -->

<div class="showcase-card">

<video controls autoplay muted loop>

<source src="Video Project1.mp4"
type="video/mp4">

</video>

</div>

</section>

<!-- TROISIÈME LIGNE -->

<section class="project-showcase">

<!-- IMAGE -->

<div class="showcase-card">

<img src="image posst .png"
alt="posst">

</div>

<!-- VIDEO -->

<div class="showcase-card">

<video controls autoplay muted loop>

<source src="Video Project.mp4"
type="video/mp4">

</video>

</div>
    
</body>>
</html>
